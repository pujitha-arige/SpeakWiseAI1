<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeakWise AI Coach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="speakwise.css">
  <script src="config.js" defer></script>
  <script src="ai_engine.js" defer></script>
  <script src="speakwise.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

  <!-- Navigation -->
  <nav id="navbar" class="hidden bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
    <div class="font-bold text-xl text-blue-600">SpeakWise AI</div>
    <div class="space-x-4">
      <button onclick="navigate('dashboard')" class="text-gray-600 hover:text-blue-600">Dashboard</button>
      <button onclick="logout()" class="text-red-500 hover:text-red-700">Logout</button>
    </div>
  </nav>

  <!-- Login Section -->
  <section id="login-section" class="flex flex-col justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Login to SpeakWise</h2>
      <div id="login-error" class="text-red-500 mb-4 hidden"></div>
      <input type="email" id="email" placeholder="Email" class="w-full mb-4 p-3 border rounded">
      <input type="password" id="password" placeholder="Password" class="w-full mb-6 p-3 border rounded">
      <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">Sign In</button>
    </div>
  </section>

  <!-- Dashboard Section -->
  <section id="dashboard-section" class="hidden p-6 max-w-4xl mx-auto mt-8">
    <h1 class="text-3xl font-bold mb-8">Welcome back!</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl shadow border">
        <h3 class="text-lg font-semibold mb-2">Plan a Session</h3>
        <p class="text-gray-600 mb-4">Let AI help you build your next presentation.</p>
        <button onclick="alert('Session Planner coming soon!')" class="text-blue-600 font-bold">Start Planning &rarr;</button>
      </div>
      
      <div class="bg-white p-6 rounded-xl shadow border">
        <h3 class="text-lg font-semibold mb-2">Practice Speech</h3>
        <p class="text-gray-600 mb-4">Record yourself and get instant AI feedback.</p>
        <button onclick="evaluateSpeech()" class="text-blue-600 font-bold">Start Practice &rarr;</button>
      </div>
    </div>

    <!-- AI Output Area -->
    <div id="ai-results" class="bg-white p-6 rounded-xl shadow border hidden">
      <h3 class="text-xl font-bold mb-4">AI Evaluation Results</h3>
      <p id="ai-feedback" class="text-gray-700"></p>
    </div>
  </section>

</body>
</html>
